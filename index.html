    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #E8E4D9 0%, #D5CFC0 100%);
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .logo-header {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .logo-header img {
            max-width: 100%;
            height: auto;
            max-height: 200px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 32px;
            margin-bottom: 20px;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #2F4858;
            margin-bottom: 4px;
            font-weight: 700;
        }
        
        .header .subtitle {
            color: #B89968;
            font-size: 14px;
            font-weight: 600;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #E8E4D9;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 16px;
        }
        
        .progress-fill {
            height: 100%;
            background: #B89968;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .question {
            font-size: 18px;
            font-weight: 600;
            color: #2F4858;
            margin-bottom: 20px;
        }
        
        .option-btn {
            width: 100%;
            padding: 18px 24px;
            margin-bottom: 12px;
            background: white;
            border: 2px solid #E8E4D9;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #2F4858;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        
        .option-btn:hover {
            border-color: #B89968;
            background: #FFFDF8;
        }
        
        .option-btn.selected {
            border-color: #B89968;
            background: #FFF9ED;
        }
        
        .info-box {
            background: #F0F9FF;
            border: 2px solid #BAE6FD;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0C4A6E;
        }
        
        .info-box.warning {
            background: #FEF3C7;
            border-color: #FCD34D;
            color: #78350F;
        }
        
        .info-box.success {
            background: #D1FAE5;
            border-color: #6EE7B7;
            color: #065F46;
        }
        
        .info-box strong {
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2F4858;
            margin-bottom: 8px;
        }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E8E4D9;
            border-radius: 10px;
            font-size: 16px;
            color: #2F4858;
            transition: border-color 0.2s ease;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #B89968;
        }
        
        .form-input.amount {
            padding-left: 32px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .amount-wrapper {
            position: relative;
        }
        
        .amount-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #9CA3AF;
            font-weight: 600;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .upload-area {
            border: 2px dashed #D1D5DB;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .upload-area:hover {
            border-color: #B89968;
            background: #FFFDF8;
        }
        
        .upload-area.has-file {
            border-color: #6EE7B7;
            background: #D1FAE5;
        }
        
        .upload-icon {
            font-size: 40px;
            margin-bottom: 8px;
            color: #9CA3AF;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: #F9FAFB;
            border-radius: 10px;
            margin-top: 16px;
            cursor: pointer;
        }
        
        .checkbox-wrapper:hover {
            background: #F3F4F6;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
        }
        
        .checkbox-label {
            font-size: 14px;
            color: #374151;
            cursor: pointer;
        }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: #2F4858;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #253A47;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(47, 72, 88, 0.3);
        }
        
        .btn-primary:disabled {
            background: #D1D5DB;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            margin-top: 16px;
            color: #B89968;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px;
        }
        
        .btn-secondary:hover {
            color: #A08555;
        }
        
        .hidden {
            display: none;
        }

        .success-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 28px;
            font-weight: 700;
            color: #2F4858;
            margin-bottom: 12px;
        }

        .success-message {
            font-size: 16px;
            color: #6B7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            
            .logo-header {
                padding: 20px;
            }
            
            .card {
                padding: 24px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

            switch(state.currentStep) {
                case 1:
                    container.innerHTML = `
                        <div class="question">Let's get started! Who's submitting this expense?</div>
                        ${createButtons(['Scott L', 'John D', 'Andrew B'], 'submitter')}
                        <button class="btn-primary" onclick="nextStep()" id="step1-continue" disabled>Continue</button>
                    `;
                    setTimeout(() => {
                        document.querySelectorAll('.option-btn').forEach(btn => {
                            btn.addEventListener('click', () => {
                                document.getElementById('step1-continue').disabled = false;
                            });
                        });
                    }, 0);
                    break;
                    
                case 2:
                    container.innerHTML = `
                        <div class="question">Is this a purchase or a return?</div>
                        ${createButtons(['Purchase', 'Return'], 'transactionType')}
                        <button class="btn-primary" onclick="nextStep()" id="step2-continue" disabled>Continue</button>
                    `;
                    setTimeout(() => {
                        document.querySelectorAll('.option-btn').forEach(btn => {
                            btn.addEventListener('click', () => {
                                document.getElementById('step2-continue').disabled = false;
                            });
                        });
                    }, 0);
                    break;
                    
                case 3:
                    if (state.transactionType === 'Purchase') {
                        container.innerHTML = `
                            <div class="question">What type of expense are you submitting?</div>
                            ${createButtons(['Company Credit Card', 'Personal Expense Reimbursement', 'Vendor Invoice', 'ACH Bank Payment'], 'entryType')}
                            <button class="btn-primary" onclick="nextStep()" id="step3-continue" disabled>Continue</button>
                        `;
                        setTimeout(() => {
                            document.querySelectorAll('.option-btn').forEach(btn => {
                                btn.addEventListener('click', () => {
                                    document.getElementById('step3-continue').disabled = false;
                                });
                            });
                        }, 0);
                    } else {
                        // Return flow
                        container.innerHTML = `
                            <div class="question">What type of return is this?</div>
                            ${createButtons(['Credit Card Return', 'Vendor Account Credit'], 'entryType')}
                            <button class="btn-primary" onclick="nextStep()" id="step3-continue" disabled>Continue</button>
                        `;
                        setTimeout(() => {
                            document.querySelectorAll('.option-btn').forEach(btn => {
                                btn.addEventListener('click', () => {
                                    document.getElementById('step3-continue').disabled = false;
                                });
                            });
                        }, 0);
                    }
                    break;
                    
                case 4:
                case 4:
                    if (state.entryType === 'Company Credit Card' || state.entryType === 'Credit Card Return') {
                        const questionText = state.transactionType === 'Return' 
                            ? 'Which company card was this return credited to?'
                            : 'Which company card did you use for this purchase?';
                        container.innerHTML = `
                            <div class="question">${questionText}</div>
                            ${createButtons(["Andrew's CTX Card", "Scott's CTX Card", "John's CTX Card", 'Riverside AMEX Card', 'Gloria Inn Capital 1 Mastercard'], 'cardType')}
                            <button class="btn-primary" onclick="handleCardContinue()" id="step4-continue" disabled>Continue</button>
                        `;
                        setTimeout(() => {
                            document.querySelectorAll('.option-btn').forEach(btn => {
                                btn.addEventListener('click', () => {
                                    document.getElementById('step4-continue').disabled = false;
                                });
                            });
                        }, 0);
                    } else if (state.entryType === 'Personal Expense Reimbursement') {
                        state.company = 'CTX Development Group LLC';
                        container.innerHTML = `
                            <div class="info-box warning">
                                <strong>Good to know:</strong><br>
                                All personal expense reimbursements are paid by CTX Development Group LLC. We'll assign that automatically for you.
                            </div>
                            <button class="btn-primary" onclick="nextStep()">Got it, Continue</button>
                        `;
                    } else {
                        // Vendor Invoice, ACH Bank Payment, or Vendor Account Credit
                        const questionText = state.entryType === 'Vendor Account Credit'
                            ? 'Which company should receive this vendor credit?'
                            : state.entryType === 'ACH Bank Payment'
                            ? 'Which company made this ACH payment?'
                            : 'Do you know which company should pay for this invoice?';
                        const infoText = state.entryType === 'Vendor Account Credit'
                            ? 'If you know the company, select it below. If you\'re not sure, click "I don\'t know" and we\'ll help you find it by property.'
                            : state.entryType === 'ACH Bank Payment'
                            ? 'If you know the company, select it below. If you\'re not sure, click "I don\'t know" and we\'ll help you find it by property.'
                            : 'If you know the company, select it below. If you\'re not sure, click "I don\'t know" and we\'ll help you find it by property.';
                        container.innerHTML = `
                            <div class="question">${questionText}</div>
                            <div class="info-box">
                                ${infoText}
                            </div>
                            <div class="form-group">
                                <select class="form-select" id="company-select">
                                    <option value="">Select a company...</option>
                                    ${Object.keys(companyPropertyMap).map(c => `<option value="${c}">${c}</option>`).join('')}
                                </select>
                            </div>
                            <button class="btn-primary" onclick="nextStep()" style="margin-bottom: 12px">Continue</button>
                            <button class="option-btn" onclick="nextStep()">I don't know - help me find it by property</button>
                        `;
                        setTimeout(() => {
                            document.getElementById('company-select').addEventListener('change', (e) => {
                                state.company = e.target.value;
                            });
                        }, 0);
                    }
                    break;
                    
                case 5:
                case 5:
                    const properties = getPropertyOptions();
                    const propertyQuestion = state.transactionType === 'Return'
                        ? 'Which job or property does this return relate to?'
                        : 'Which job or property does this expense relate to?';
                    container.innerHTML = `
                        <div class="question">${propertyQuestion}</div>
                        ${state.company ? `<div class="info-box success"><strong>Company:</strong> ${state.company}</div>` : ''}
                        <div class="form-group">
                            <label class="form-label">Choose the property:</label>
                            <select class="form-select" id="property-select">
                                <option value="">Select a property...</option>
                                ${properties.map(p => `<option value="${p}">${p}</option>`).join('')}
                            </select>
                        </div>
                        <button class="btn-primary" onclick="nextStep()" id="property-continue" disabled>Continue</button>
                    `;
                    setTimeout(() => {
                        document.getElementById('property-select').addEventListener('change', (e) => {
                            state.property = e.target.value;
                            document.getElementById('property-continue').disabled = !e.target.value;
                        });
                    }, 0);
                    break;
                    
                case 6:
                    const isReturn = state.transactionType === 'Return';
                    const isVendorInvoice = state.entryType === 'Vendor Invoice' || state.entryType === 'ACH Bank Payment';
                    
                    let detailsQuestion, merchantLabel, amountLabel, descriptionLabel, descriptionPlaceholder;
                    
                    if (isVendorInvoice) {
                        detailsQuestion = state.entryType === 'ACH Bank Payment' 
                            ? 'Tell us about this ACH bank payment'
                            : 'Tell us about this vendor invoice';
                        merchantLabel = 'Vendor Name - Who provided this service or materials?';
                        amountLabel = 'Bill Amount';
                        descriptionLabel = 'What is this bill for?';
                        descriptionPlaceholder = 'e.g., Plumbing repairs, Monthly lawn service, Materials for renovation';
                    } else if (isReturn) {
                        detailsQuestion = 'Tell us about this return';
                        merchantLabel = 'Where was this return processed?';
                        amountLabel = 'What was the return amount?';
                        descriptionLabel = 'What was returned and why?';
                        descriptionPlaceholder = 'e.g., Returned damaged lumber, Wrong part ordered, Duplicate purchase';
                    } else {
                        detailsQuestion = 'Tell us about this expense';
                        merchantLabel = 'Where did you make this purchase?';
                        amountLabel = 'How much was it?';
                        descriptionLabel = 'What was this purchase for?';
                        descriptionPlaceholder = 'e.g., Lumber for deck repair, Office supplies, Monthly internet service';
                    }
                    
                    container.innerHTML = `
                        <div class="question">${detailsQuestion}</div>
                        ${isVendorInvoice ? `
                            <div class="form-group">
                                <label class="form-label">Vendor Invoice Number <span style="color: #ef4444;">*</span></label>
                                <input type="text" class="form-input" id="invoice-number-input" placeholder="e.g., INV-12345, 2024-001">
                            </div>
                        ` : ''}
                        <div class="form-group">
                            <label class="form-label">${merchantLabel}</label>
                            <input type="text" class="form-input" id="merchant-input" placeholder="e.g., ${isVendorInvoice ? 'ABC Plumbing, XYZ Contractors' : 'Home Depot, Walmart, Joe\'s Plumbing'}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">${amountLabel}</label>
                            <div class="amount-wrapper">
                                <span class="amount-symbol">$</span>
                                <input type="number" step="0.01" class="form-input amount" id="amount-input" placeholder="0.00">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">${descriptionLabel}</label>
                            <textarea class="form-textarea" id="description-input" placeholder="${descriptionPlaceholder}"></textarea>
                        </div>
                        <button class="btn-primary" onclick="nextStep()" id="details-continue" disabled>Continue</button>
                    `;
                    setTimeout(() => {
                        const inputIds = ['merchant-input', 'amount-input', 'description-input'];
                        if (isVendorInvoice) {
                            inputIds.unshift('invoice-number-input');
                        }
                        inputIds.forEach(id => {
                            document.getElementById(id).addEventListener('input', checkDetailsComplete);
                        });
                    }, 0);
                    break;
                    
                case 7:
                case 7:
                    const attachmentQuestion = state.transactionType === 'Return'
                        ? 'Almost done! Do you have a credit memo or return receipt?'
                        : 'Almost done! Do you have a receipt or invoice?';
                    const attachmentTip = state.transactionType === 'Return'
                        ? '<strong>Tip:</strong> Upload a photo of the credit memo or return receipt if you have one.'
                        : '<strong>Tip:</strong> You can take a quick photo of your receipt with your phone camera, or upload a PDF invoice if you have one.';
                    const attachmentStatus = state.transactionType === 'Return'
                        ? 'Tap here to attach credit memo or return receipt'
                        : 'Tap here to attach your receipt';
                    const checkboxLabel = state.transactionType === 'Return'
                        ? "I don't have the credit memo right now, but I'll send it later"
                        : "I don't have a receipt right now, but I'll send it later";
                    const submitButtonText = state.transactionType === 'Return'
                        ? 'Submit My Return'
                        : 'Submit My Expense';
                    
                    container.innerHTML = `
                        <div class="question">${attachmentQuestion}</div>
                        <div class="info-box">
                            ${attachmentTip}
                        </div>
                        <div class="form-group">
                            <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                                <input type="file" id="file-input" accept="image/*,.pdf" multiple style="display: none" onchange="handleFiles(this)">
                                <div class="upload-icon">📎</div>
                                <div id="file-status">${attachmentStatus}</div>
                            </div>
                            <div id="files-list" style="margin-top: 12px;"></div>
                            
                            <div class="checkbox-wrapper hidden" id="no-attachment-wrapper">
                                <input type="checkbox" id="no-attachment-check" onchange="toggleSubmit()">
                                <label class="checkbox-label" for="no-attachment-check">
                                    ${checkboxLabel}
                                </label>
                            </div>
                        </div>
                        <button class="btn-primary" onclick="submitForm()" id="submit-btn" disabled>${submitButtonText}</button>
                    `;
                    setTimeout(() => {
                        document.getElementById('no-attachment-wrapper').classList.remove('hidden');
                    }, 100);
                    break;
                    
                case 8:
                    // Success screen
                    container.innerHTML = `
                        <div class="success-screen">
                            <div class="success-icon">✓</div>
                            <h2 class="success-title">Thanks for your submission!</h2>
                            <p class="success-message">Your entry has been sent to the accounting team for review.</p>
                            <p style="font-size: 14px; color: #9CA3AF; margin-top: 16px;">Automatically returning to start in <span id="countdown">5</span> seconds...</p>
                            <button class="btn-primary" onclick="resetForm()">Submit Another Expense</button>
                        </div>
                    `;
                    document.getElementById('back-btn').classList.add('hidden');
                    document.getElementById('page-title').textContent = 'Submission Complete';
                    document.getElementById('step-indicator').textContent = '';
                    document.getElementById('progress-fill').style.width = '100%';
                    
                    // Countdown timer
                    let timeLeft = 5;
                    const countdownInterval = setInterval(() => {
                        timeLeft--;
                        const countdownEl = document.getElementById('countdown');
                        if (countdownEl) {
                            countdownEl.textContent = timeLeft;
                        }
                        if (timeLeft <= 0) {
                            clearInterval(countdownInterval);
                        }
                    }, 1000);
                    break;
            }
        }

        function createButtons(options, key) {
            return options.map(opt => `
                <button class="option-btn ${state[key] === opt ? 'selected' : ''}" onclick="selectOption('${key}', '${opt.replace(/'/g, "\\'")}')">
                    ${opt}
                </button>
            `).join('');
        }

        function selectOption(key, value) {
            state[key] = value;
            // Update button states
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function handleCardContinue() {
            const selectedCard = state.cardType;
            if (selectedCard && selectedCard.includes('CTX Card')) {
                state.company = 'CTX Development Group LLC';
            } else if (selectedCard === 'Riverside AMEX Card') {
                state.company = 'Owen Rose Properties LLC';
            } else if (selectedCard === 'Gloria Inn Capital 1 Mastercard') {
                state.company = 'OOGG, LLC';
            }
            nextStep();
        }

        function getPropertyOptions() {
            if (state.cardType === 'Riverside AMEX Card') {
                return ['Owen Rose - River House Aquilla', 'Owen Rose - Riverside Acres Land Aquilla'];
            }
            if (state.cardType === 'Gloria Inn Capital 1 Mastercard') {
                return ['OOGG - Gloria Inn', 'OOGG - Gloria Manor', 'OOGG - Gloria Cottage', 'OOGG - Gloria Estate', 'OOGG - Gloria Inn & Cottages_All Properties'];
            }
            // CTX Cards (Andrew's, Scott's, John's) should have access to ALL properties
            if (state.cardType && state.cardType.includes('CTX Card')) {
                return allProperties;
            }
            // For Vendor Invoices/ACH Payments, use company-specific properties
            if (state.company && companyPropertyMap[state.company]) {
                return companyPropertyMap[state.company];
            }
            return allProperties;
        }

        function checkDetailsComplete() {
            const isVendorInvoice = state.entryType === 'Vendor Invoice' || state.entryType === 'ACH Bank Payment';
            
            // Get invoice number if field exists
            const invoiceInput = document.getElementById('invoice-number-input');
            if (invoiceInput) {
                state.invoiceNumber = invoiceInput.value;
            }
            
            state.merchant = document.getElementById('merchant-input').value;
            state.amount = document.getElementById('amount-input').value;
            state.description = document.getElementById('description-input').value;
            const btn = document.getElementById('details-continue');
            if (btn) {
                // For vendor invoices and ACH payments, require invoice number
                if (isVendorInvoice) {
                    btn.disabled = !state.invoiceNumber || !state.merchant || !state.amount || !state.description;
                } else {
                    btn.disabled = !state.merchant || !state.amount || !state.description;
                }
            }
        }

        function handleFiles(input) {
            if (input.files && input.files.length > 0) {
                // Add new files to existing attachments
                for (let i = 0; i < input.files.length; i++) {
                    state.attachments.push(input.files[i]);
                }
                
                updateFilesList();
                document.getElementById('no-attachment-wrapper').classList.add('hidden');
                document.getElementById('submit-btn').disabled = false;
                state.noAttachment = false;
                
                // Reset the input so the same file can be selected again or user can add more
                input.value = '';
            }
        }
        
        function updateFilesList() {
            const filesList = document.getElementById('files-list');
            const uploadArea = document.getElementById('upload-area');
            const fileStatus = document.getElementById('file-status');
            
            if (state.attachments.length > 0) {
                uploadArea.classList.add('has-file');
                fileStatus.innerHTML = `✓ ${state.attachments.length} file${state.attachments.length > 1 ? 's' : ''} selected<br><span style="font-size: 12px; color: #666;">Tap to add more</span>`;
                
                // Show list of files with remove buttons
                filesList.innerHTML = state.attachments.map((file, index) => `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px; background: #f9f9f9; border-radius: 4px; margin-bottom: 6px;">
                        <span style="font-size: 13px; color: #333;">📄 ${file.name}</span>
                        <button type="button" onclick="removeFile(${index})" style="background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;">Remove</button>
                    </div>
                `).join('');
            } else {
                uploadArea.classList.remove('has-file');
                fileStatus.textContent = state.transactionType === 'Return' 
                    ? 'Tap here to attach credit memo or return receipt'
                    : 'Tap here to attach your receipt';
                filesList.innerHTML = '';
            }
        }
        
        function removeFile(index) {
            state.attachments.splice(index, 1);
            updateFilesList();
            
            // Update submit button state
            const checkbox = document.getElementById('no-attachment-check');
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = state.attachments.length === 0 && !checkbox.checked;
        }

        function toggleSubmit() {
            const checkbox = document.getElementById('no-attachment-check');
            const submitBtn = document.getElementById('submit-btn');
            state.noAttachment = checkbox.checked;
            submitBtn.disabled = !checkbox.checked && state.attachments.length === 0;
        }

        function nextStep() {
            if (state.currentStep === 2) {
                // Clear entry type when switching between purchase/return
                state.entryType = '';
            }
            if (state.currentStep === 3) {
                state.cardType = '';
                state.company = '';
            }
            if (state.currentStep === 6) {
                const invoiceInput = document.getElementById('invoice-number-input');
                if (invoiceInput) {
                    state.invoiceNumber = invoiceInput.value;
                }
                state.merchant = document.getElementById('merchant-input').value;
                state.amount = document.getElementById('amount-input').value;
                state.description = document.getElementById('description-input').value;
            }
            if (state.currentStep === 4 && (state.entryType === 'Vendor Invoice' || state.entryType === 'ACH Bank Payment' || state.entryType === 'Vendor Account Credit')) {
                const select = document.getElementById('company-select');
                if (select) state.company = select.value;
            }
            state.currentStep++;
            renderStep();
        }

        function goBack() {
            state.currentStep--;
            renderStep();
        }

        async function submitForm() {
            // Disable submit button immediately to prevent double-clicks
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn.disabled) {
                return; // Already submitting, ignore this click
            }
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            // PRODUCTION VERSION - Sends to Google Apps Script
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw28-HrZAgsOLGzA6c1Qbc3QqltH568w4Rifc-9jqlreClp5f3_ZnRku4V_TqKuvW_bEA/exec';
            
            // Prepare the data
            const formData = {
                submitter: state.submitter,
                transactionType: state.transactionType,
                entryType: state.entryType,
                cardType: state.cardType,
                company: state.company,
                property: state.property,
                merchant: state.merchant,
                amount: state.amount,
                description: state.description,
                invoiceNumber: state.invoiceNumber || '', // Include invoice number
                hasAttachment: state.attachments.length > 0,
                attachmentCount: state.attachments.length,
                attachments: []
            };
            
            // Convert all attachments to base64
            if (state.attachments.length > 0) {
                try {
                    for (let i = 0; i < state.attachments.length; i++) {
                        const file = state.attachments[i];
                        const reader = new FileReader();
                        const base64Data = await new Promise((resolve, reject) => {
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.onerror = reject;
                            reader.readAsDataURL(file);
                        });
                        formData.attachments.push({
                            name: file.name,
                            type: file.type,
                            data: base64Data
                        });
                    }
                } catch (error) {
                    console.error('Error reading attachments:', error);
                }
            }
            
            // Send to Google Apps Script
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                // Note: no-cors mode means we can't read the response, but the email will still send
                // Show success screen
                state.currentStep = 8;
                renderStep();
                
                // Auto-return to home after 5 seconds
                setTimeout(() => {
                    resetForm();
                }, 5000);
                
            } catch (error) {
                console.error('Error submitting form:', error);
                // Re-enable button on error so they can retry
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit My Expense';
                alert('There was an error submitting your expense. Please try again or contact IT support.');
            }
        }

        function resetForm() {
            // Reset all state
            Object.keys(state).forEach(k => {
                if (k === 'currentStep') {
                    state[k] = 1;
                } else if (k === 'attachments') {
                    state[k] = [];
                } else if (k === 'noAttachment') {
                    state[k] = false;
                } else {
                    state[k] = '';
                }
            });
            renderStep();
        }

        // Start
        renderStep();
    </script>
</body>
</html>
